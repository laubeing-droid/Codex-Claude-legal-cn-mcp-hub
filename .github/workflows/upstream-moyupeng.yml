name: Upstream Monitor (moyupeng0422)

on:
  schedule:
    - cron: '0 6 * * *'   # 每天 UTC 6:00（北京时间 14:00）
  workflow_dispatch:       # 手动触发

permissions:
  issues: write
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch moyupeng0422/legal-tools upstream
        id: fetch
        run: |
          CACHE_FILE=".upstream-moyupeng-last"
          REPORT="## moyupeng0422/legal-tools 上游更新报告%0A%0A"
          REPORT+="检查时间: $(date -u '+%Y-%m-%d %H:%M UTC')%0A%0A"
          CHANGED=false
          TMPDIR=$(mktemp -d)

          # Clone upstream
          git clone --depth 1 https://github.com/moyupeng0422/legal-tools.git "$TMPDIR/upstream" 2>/dev/null

          # Files to compare: relative paths in our repo vs upstream
          FILES=(
            "servers/rmfyalk/scripts/server.py:人民法院案例库MCP/scripts/server.py"
            "servers/rmfyalk/scripts/client.py:人民法院案例库MCP/scripts/client.py"
            "servers/rmfyalk/scripts/models.py:人民法院案例库MCP/scripts/models.py"
            "servers/rmfyalk/scripts/formatters.py:人民法院案例库MCP/scripts/formatters.py"
            "servers/rmfyalk/scripts/export_cases.py:人民法院案例库MCP/scripts/export_cases.py"
            "servers/rmfyalk/scripts/export_formatter.py:人民法院案例库MCP/scripts/export_formatter.py"
            "servers/rmfyalk/requirements.txt:人民法院案例库MCP/requirements.txt"
            "servers/rmfyalk/.env.example:人民法院案例库MCP/.env.example"
            "servers/rmfyalk/references/api-reference.md:人民法院案例库MCP/references/api-reference.md"
            "servers/flk-npc/scripts/server.py:国家法律法规数据库MCP/scripts/server.py"
            "servers/flk-npc/scripts/client.py:国家法律法规数据库MCP/scripts/client.py"
            "servers/flk-npc/scripts/models.py:国家法律法规数据库MCP/scripts/models.py"
            "servers/flk-npc/scripts/formatters.py:国家法律法规数据库MCP/scripts/formatters.py"
            "servers/flk-npc/scripts/export_laws.py:国家法律法规数据库MCP/scripts/export_laws.py"
            "servers/flk-npc/scripts/export_formatter.py:国家法律法规数据库MCP/scripts/export_formatter.py"
            "servers/flk-npc/requirements.txt:国家法律法规数据库MCP/requirements.txt"
            "servers/flk-npc/.env.example:国家法律法规数据库MCP/.env.example"
            "servers/flk-npc/references/05-flk-api-reference.md:国家法律法规数据库MCP/references/05-flk-api-reference.md"
          )

          # Hash reference
          NEW_HASH=""
          for entry in "${FILES[@]}"; do
            LOCAL="${entry%%:*}"
            UP="${entry##*:}"
            LOCAL_PATH="$GITHUB_WORKSPACE/$LOCAL"
            UP_PATH="$TMPDIR/upstream/$UP"

            if [ ! -f "$UP_PATH" ]; then
              REPORT+="⚠️ 上游文件已删除: \`$UP\` (对应本地 \`$LOCAL\`)%0A"
              CHANGED=true
              continue
            fi

            if [ ! -f "$LOCAL_PATH" ]; then
              REPORT+="🆕 上游新增文件: \`$UP\` → 需要复制到本地 \`$LOCAL\`%0A"
              CHANGED=true
              continue
            fi

            # Compare
            if ! diff -q "$LOCAL_PATH" "$UP_PATH" > /dev/null 2>&1; then
              CHANGED=true
              LOCAL_LINES=$(wc -l < "$LOCAL_PATH")
              UP_LINES=$(wc -l < "$UP_PATH")
              DIFF_LINES=$(diff "$LOCAL_PATH" "$UP_PATH" | grep -c '^[<>]' 2>/dev/null || echo 0)
              REPORT+="🟡 文件已变更: \`$LOCAL\`%0A"
              REPORT+="   - 本地: $LOCAL_LINES 行 | 上游: $UP_LINES 行 | 差异: $DIFF_LINES 行%0A"
            else
              REPORT+="✅ 未变更: \`$LOCAL\`%0A"
            fi

            # Build hash
            HASH_PART=$(md5sum "$UP_PATH" 2>/dev/null | cut -d' ' -f1 || echo "")
            NEW_HASH="${NEW_HASH}${LOCAL}=${HASH_PART}%0A"
          done

          # Also check for new directories/files upstream
          REPORT+="%0A---%0A"
          REPORT+="### 上游最近提交%0A"
          cd "$TMPDIR/upstream"
          LAST_COMMIT=$(git log -1 --format='%h %s (%ai)' 2>/dev/null || echo "unknown")
          REPORT+="\`\`\`%0A$LAST_COMMIT%0A\`\`\`%0A"

          if [ "$CHANGED" = "true" ]; then
            REPORT+="%0A🔄 检测到变更！建议运行以下命令同步：%0A"
            REPORT+="\`\`\`bash%0A"
            REPORT+="# 克隆上游最新代码后复制对应文件即可%0A"
            REPORT+="git clone --depth 1 https://github.com/moyupeng0422/legal-tools.git /tmp/legal-tools%0A"
            REPORT+="cp /tmp/legal-tools/人民法院案例库MCP/scripts/*.py servers/rmfyalk/scripts/%0A"
            REPORT+="cp /tmp/legal-tools/国家法律法规数据库MCP/scripts/*.py servers/flk-npc/scripts/%0A"
            REPORT+="\`\`\`%0A"
          fi

          echo "report=$REPORT" >> $GITHUB_OUTPUT
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

          # Cache hash
          echo "$(date -u '+%Y-%m-%d')" > "$CACHE_FILE"
          for entry in "${FILES[@]}"; do
            LOCAL="${entry%%:*}"
            UP="${entry##*:}"
            UP_PATH="$TMPDIR/upstream/$UP"
            if [ -f "$UP_PATH" ]; then
              echo "$LOCAL=$(md5sum "$UP_PATH" | cut -d' ' -f1)" >> "$CACHE_FILE"
            fi
          done

          rm -rf "$TMPDIR"

      - name: Create or update issue
        if: steps.fetch.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = decodeURIComponent('${{ steps.fetch.outputs.report }}');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['upstream-moyupeng0422']
            });
            if (issues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: report
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'moyupeng0422/legal-tools 上游更新 - ' + new Date().toISOString().slice(0, 10),
                body: report,
                labels: ['upstream-moyupeng0422']
              });
            }

      - name: Cache last check
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .upstream-moyupeng-last 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update moyupeng0422 upstream cache"
          git push
